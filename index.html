<!DOCTYPE html>
<html>
<head>
<title>Nu Age Gmail Job Extractor</title>
<style>

body{
font-family: Arial;
background:#071a3a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:600px;
text-align:center;
}

textarea{
width:100%;
height:200px;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:15px;
}

button{
background:#6ac24b;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5ab33c;
}

.output{
margin-top:20px;
background:#0c2b5e;
padding:15px;
border-radius:8px;
text-align:left;
white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<h2>Nu Age Gmail → CommuSoft Extractor</h2>

<textarea id="email" placeholder="Paste the Gmail message here..."></textarea>

<button onclick="extract()">Extract Job Info</button>

<div class="output" id="output"></div>

</div>

<script>

function extract(){

let text=document.getElementById("email").value

let postcode=text.match(/[A-Z]{1,2}\d{1,2}\s?\d[A-Z]{2}/i)
let phone=text.match(/(\+44|0)\d{9,10}/)

let result=
`Contact Name:
Address:
Postcode: ${postcode ? postcode[0] : ""}

Phone: ${phone ? phone[0] : ""}

Job Notes:
${text}`

document.getElementById("output").innerText=result

}

</script>

</body>
</html>
