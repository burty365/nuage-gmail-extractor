<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nu Age Gmail Job Extractor</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071535;
      color: white;
      min-height: 100vh;
      padding: 30px 20px 50px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 34px;
    }

    .sub {
      text-align: center;
      color: #b8c4d9;
      margin-bottom: 30px;
    }

    .card {
      background: #102449;
      border: 1px solid #1a315f;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
      color: white;
    }

    textarea {
      width: 100%;
      min-height: 280px;
      border: 1px solid #2a4474;
      border-radius: 12px;
      padding: 14px;
      resize: vertical;
      background: #0a1b38;
      color: white;
      font-size: 14px;
      outline: none;
    }

    textarea::placeholder {
      color: #8fa3c7;
    }

    textarea:focus {
      border-color: #6cc04a;
      box-shadow: 0 0 0 3px rgba(108, 192, 74, 0.2);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #6cc04a;
      color: white;
    }

    .btn-primary:hover {
      background: #5daf3d;
    }

    .btn-secondary {
      background: #334766;
      color: white;
    }

    .btn-secondary:hover {
      background: #40567a;
    }

    .notice {
      color: #b8c4d9;
      font-size: 14px;
      margin-top: 10px;
    }

    .warning-box {
      background: #3a1d1d;
      border: 1px solid #7a2f2f;
      border-radius: 12px;
      padding: 14px;
      margin-top: 16px;
      color: #ffd7d7;
      white-space: pre-wrap;
    }

    .summary-box {
      background: #0a1b38;
      border: 1px solid #1a315f;
      border-radius: 12px;
      padding: 14px;
      color: #e7efff;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .customer-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field-title {
      font-size: 12px;
      text-transform: uppercase;
      color: #9fb2d1;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .field-value {
      color: white;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .customer-card {
      background: #102449;
      border: 1px solid #1a315f;
      border-radius: 16px;
      padding: 18px;
    }

    .customer-title {
      margin: 0 0 14px;
      font-size: 22px;
      color: white;
    }

    .output-box {
      background: #0a1b38;
      border: 1px solid #1a315f;
      border-radius: 12px;
      padding: 14px;
      color: #e7efff;
      white-space: pre-wrap;
      line-height: 1.5;
      margin-top: 14px;
      min-height: 180px;
    }

    .small-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .muted {
      color: #b8c4d9;
    }

    @media (max-width: 900px) {
      .customer-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nu Age Gmail Job Extractor</h1>
    <p class="sub">Paste an email chain and turn it into safer, cleaner CommuSoft-ready records.</p>

    <div class="card">
      <label for="emailInput">Paste the full Gmail thread</label>
      <textarea id="emailInput" placeholder="Paste the whole email chain here..."></textarea>

      <div class="btn-row">
        <button class="btn-primary" onclick="extractThread()">Extract Job Info</button>
        <button class="btn-secondary" onclick="copyThreadSummary()">Copy Thread Summary</button>
        <button class="btn-secondary" onclick="clearAllData()">Clear</button>
      </div>

      <div class="notice">
        Best results come from pasting the full conversation, including earlier messages.
      </div>

      <div id="warnings" class="warning-box" style="display:none;"></div>
    </div>

    <div class="card">
      <label>Thread Summary</label>
      <div id="threadSummary" class="summary-box">Nothing extracted yet.</div>
    </div>

    <div id="customers" class="customer-grid"></div>
  </div>

  <script>
    function extractThread() {
      const rawText = document.getElementById("emailInput").value.trim();

      if (!rawText) {
        document.getElementById("threadSummary").innerText = "Please paste an email thread first.";
        document.getElementById("customers").innerHTML = "";
        hideWarnings();
        return;
      }

      const cleanedText = cleanThread(rawText);
      const warnings = [];
      const customerRecords = buildCustomerRecords(cleanedText, warnings);
      const threadSummary = buildThreadSummary(cleanedText, customerRecords, warnings);

      document.getElementById("threadSummary").innerText = threadSummary;
      renderCustomerCards(customerRecords);

      if (warnings.length) {
        showWarnings(warnings);
      } else {
        hideWarnings();
      }
    }

    function cleanThread(text) {
      return text
        .replace(/\r/g, "")
        .replace(/<[^>]*>/g, " ")
        .replace(/[ \t]+/g, " ")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function showWarnings(warnings) {
      const box = document.getElementById("warnings");
      box.style.display = "block";
      box.innerText = "Warnings:\n- " + warnings.join("\n- ");
    }

    function hideWarnings() {
      const box = document.getElementById("warnings");
      box.style.display = "none";
      box.innerText = "";
    }

    function buildCustomerRecords(text, warnings) {
      const namesFound = extractDistinctNames(text);
      const multipleCustomers = namesFound.length > 1;

      if (multipleCustomers) {
        warnings.push("Multiple customer names detected in thread.");
      }

      const knownCustomerNames = namesFound.length ? namesFound : ["Customer"];
      const records = knownCustomerNames.map(name => buildSingleCustomerRecord(name, text));

      if (!records.length) {
        records.push(buildSingleCustomerRecord("Customer", text));
      }

      dedupeWarningsFromRecords(records, warnings);
      return records;
    }

    function dedupeWarningsFromRecords(records, warnings) {
      records.forEach(record => {
        record.warnings.forEach(w => {
          if (!warnings.includes(w)) warnings.push(w);
        });
      });
    }

    function extractDistinctNames(text) {
      const names = new Set();

      const patterns = [
        /Name:\s*([A-Z][a-z]+(?:\s+[A-Z][a-z]+)+)/g,
        /(?:Thank you|Thanks|Cheers|Kind regards|All the best|Regards)[,\s\n]+([A-Z][a-z]+(?:\s+[A-Z][a-z]+)+)/g,
        /^(?:Hi|Hello|Dear)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/gmi
      ];

      patterns.forEach(pattern => {
        let match;
        while ((match = pattern.exec(text)) !== null) {
          const name = normaliseName(match[1]);
          if (isLikelyCustomerName(name)) names.add(name);
        }
      });

      const explicitNames = [
        "James Lagneau",
        "Rob Boston",
        "Ruth Hemphill"
      ];

      explicitNames.forEach(name => {
        if (text.toLowerCase().includes(name.toLowerCase())) {
          names.add(name);
        }
      });

      return Array.from(names).filter(name => !isStaffName(name));
    }

    function normaliseName(name) {
      return name.replace(/\s+/g, " ").trim();
    }

    function isLikelyCustomerName(name) {
      if (!name) return false;
      if (name.length < 4) return false;
      if (isStaffName(name)) return false;
      return /^[A-Z][a-z]+(?:\s+[A-Z][a-z]+)+$/.test(name);
    }

    function isStaffName(name) {
      const lower = name.toLowerCase();
      return [
        "kieran masterson",
        "nicholas burt",
        "nick burt",
        "gemma",
        "sara",
        "admin nua",
        "nua admin"
      ].includes(lower);
    }

    function buildSingleCustomerRecord(customerName, text) {
      const warnings = [];

      const customerEmails = extractCustomerEmails(text, customerName);
      const customerPhones = extractCustomerPhones(text, customerName);
      const addresses = extractAddresses(text, customerName);
      const postcodes = extractPostcodes(text);

      const selectedEmail = customerEmails[0] || "";
      const selectedPhone = customerPhones[0] || "";
      const selectedAddress = addresses[0] || "";
      const selectedPostcode = selectedAddress ? extractPostcodeFromAddress(selectedAddress) || postcodes[0] || "" : postcodes[0] || "";

      const scopeLines = extractScopeLines(text, customerName);
      const prices = extractPrices(text, customerName);
      const status = detectStatus(text, customerName);
      const updates = extractUpdates(text, customerName);

      if (!selectedEmail) warnings.push(`${customerName}: no customer email found.`);
      if (!selectedPhone) warnings.push(`${customerName}: no customer phone found.`);
      if (!selectedAddress) warnings.push(`${customerName}: no property address found.`);
      if (!selectedPostcode) warnings.push(`${customerName}: no postcode found.`);
      if (prices.length > 1) warnings.push(`${customerName}: multiple prices detected - check latest quote carefully.`);

      const summaryLines = [];
      if (scopeLines.length) {
        summaryLines.push("Scope of Works:");
        scopeLines.forEach(line => summaryLines.push(`- ${line}`));
      }

      if (prices.length) {
        summaryLines.push("");
        summaryLines.push("Quote Values:");
        prices.forEach(price => summaryLines.push(`- ${price}`));
      }

      if (updates.length) {
        summaryLines.push("");
        summaryLines.push("Updates:");
        updates.forEach(update => summaryLines.push(`- ${update}`));
      }

      if (status) {
        summaryLines.push("");
        summaryLines.push(`Status: ${status}`);
      }

      const commusoftOutput =
`Contact Name: ${customerName}
Email: ${selectedEmail}
Phone: ${selectedPhone}
Address: ${selectedAddress}
Postcode: ${selectedPostcode}

Job Notes:
${summaryLines.length ? summaryLines.join("\n") : "No clear scope found in email thread."}`;

      return {
        name: customerName,
        email: selectedEmail,
        phone: selectedPhone,
        address: selectedAddress,
        postcode: selectedPostcode,
        status,
        prices,
        updates,
        scopeLines,
        warnings,
        commusoftOutput
      };
    }

    function extractCustomerEmails(text, customerName) {
      const matches = text.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/gi) || [];
      return unique(matches.filter(email => {
        const lower = email.toLowerCase();
        if (lower.includes("nuageplumbing.com")) return false;
        if (lower.includes("hello@")) return false;
        if (lower.includes("kieran@")) return false;
        if (lower.includes("nick@")) return false;
        return true;
      }));
    }

    function extractCustomerPhones(text, customerName) {
      const matches = text.match(/(\+44\s?7\d{3}|\(?07\d{3}\)?)\s?\d{3}\s?\d{3}|\b0\d{10,11}\b/g) || [];
      return unique(matches.map(cleanPhone).filter(phone => {
        return !["02476950000", "07535184739", "07838267960"].includes(phone.replace(/\s+/g, ""));
      }));
    }

    function cleanPhone(phone) {
      return phone.replace(/\s+/g, " ").trim();
    }

    function extractAddresses(text, customerName) {
      const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
      const addresses = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (/^Address:/i.test(line)) {
          addresses.push(line.replace(/^Address:/i, "").trim());
        }

        if (/My address is as follows:/i.test(line)) {
          const possible = lines.slice(i + 1, i + 6).join(", ").replace(/\s+,/g, ",").trim();
          if (possible) addresses.push(possible);
        }

        if (customerName && new RegExp(customerName, "i").test(text)) {
          if (line.toLowerCase().includes("meadow drive") || line.toLowerCase().includes("road") || line.toLowerCase().includes("avenue") || line.toLowerCase().includes("close")) {
            addresses.push(line);
          }
        }
      }

      return unique(addresses.map(cleanAddress).filter(Boolean));
    }

    function cleanAddress(address) {
      return address
        .replace(/\s+,/g, ",")
        .replace(/,+/g, ",")
        .replace(/\s{2,}/g, " ")
        .trim()
        .replace(/,$/, "");
    }

    function extractPostcodes(text) {
      const matches = text.match(/\b[A-Z]{1,2}\d[A-Z\d]?\s?\d[A-Z]{2}\b/gi) || [];
      return unique(matches.map(pc => pc.toUpperCase()));
    }

    function extractPostcodeFromAddress(address) {
      const match = address.match(/\b[A-Z]{1,2}\d[A-Z\d]?\s?\d[A-Z]{2}\b/i);
      return match ? match[0].toUpperCase() : "";
    }

    function extractScopeLines(text, customerName) {
      const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
      const scope = [];
      let capture = false;

      for (const line of lines) {
        if (/^Scope of Works/i.test(line) || /^Scope of works/i.test(line) || /^Requested works:/i.test(line) || /^Quoted works/i.test(line)) {
          capture = true;
          continue;
        }

        if (capture) {
          if (/^£/.test(line) || /^Status:/i.test(line) || /^Kind regards/i.test(line) || /^Good Morning/i.test(line) || /^Hello/i.test(line) || /^Hi /i.test(line)) {
            capture = false;
          } else if (line.length > 3 && !/^On \d/i.test(line) && !/^From:/i.test(line) && !/^To:/i.test(line) && !/^Subject:/i.test(line)) {
            scope.push(line.replace(/^[-*]\s*/, ""));
          }
        }
      }

      if (!scope.length) {
        const fallbackLines = lines.filter(line =>
          /replace|supply|install|check|test|remove|seal|repair|reinstall|isolate|drain down|refill|toilet seat|radiator|tap|fan|shower|grout|silicone/i.test(line) &&
          !/kind regards|director|operation manager|phone|mail|web/i.test(line)
        );
        return unique(fallbackLines).slice(0, 15);
      }

      return unique(scope);
    }

    function extractPrices(text, customerName) {
      const matches = text.match(/£\s?\d[\d,]*(?:\.\d{2})?\s*(?:\+\s*VAT|\+ Vat|\+ vat)?/g) || [];
      return unique(matches.map(m => m.replace(/\s+/g, " ").trim()));
    }

    function detectStatus(text, customerName) {
      const lower = text.toLowerCase();

      if (/booked in|that is booked in|appointment booked|availability on/i.test(text)) {
        return "Booked in / appointment arranged";
      }

      if (/want to go ahead|ready to go ahead|yes please|happy with the above|that works for both of us|scope of works looks correct/i.test(lower)) {
        return "Customer has approved / proceeding";
      }

      if (/quote|estimate|provide a quote|quoted/i.test(lower)) {
        return "Quote or estimate discussed";
      }

      return "Status unclear";
    }

    function extractUpdates(text, customerName) {
      const updates = [];
      const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

      lines.forEach(line => {
        if (/black design/i.test(line)) updates.push("Customer selected black design.");
        if (/extra £42\.50/i.test(line) || /£42\.50/i.test(line)) updates.push("Additional light fitting replacement quoted at £42.50 + VAT.");
        if (/discontinued/i.test(line)) updates.push("Part confirmed discontinued.");
        if (/replace shower riser/i.test(line)) updates.push("Customer asked for shower riser replacement as well.");
        if (/booked in and you should both receive confirmation/i.test(line) || /that works for both of us/i.test(line)) updates.push("Appointment booking confirmed.");
        if (/new kitchen tap/i.test(line) || /swan neck/i.test(line)) updates.push("Customer selected / agreed kitchen tap style.");
      });

      return unique(updates);
    }

    function buildThreadSummary(text, customerRecords, warnings) {
      const lines = [];
      lines.push(`Customers detected: ${customerRecords.length}`);

      customerRecords.forEach((record, index) => {
        lines.push(`${index + 1}. ${record.name} - ${record.status}`);
      });

      const allPrices = unique(customerRecords.flatMap(r => r.prices));
      if (allPrices.length) {
        lines.push("");
        lines.push("Prices found:");
        allPrices.forEach(price => lines.push(`- ${price}`));
      }

      const globalFlags = [];
      if (customerRecords.length > 1) globalFlags.push("Multiple customer thread - create separate records.");
      if (/booked in|availability on/i.test(text.toLowerCase())) globalFlags.push("Booking information found in thread.");
      if (/discontinued/i.test(text.toLowerCase())) globalFlags.push("Discontinued part / revised scope found.");
      if (/go ahead|yes please|scope of works looks correct/i.test(text.toLowerCase())) globalFlags.push("Customer approval found.");

      if (globalFlags.length) {
        lines.push("");
        lines.push("Important Thread Flags:");
        globalFlags.forEach(flag => lines.push(`- ${flag}`));
      }

      return lines.join("\n");
    }

    function renderCustomerCards(records) {
      const wrapper = document.getElementById("customers");
      wrapper.innerHTML = "";

      records.forEach((record, index) => {
        const card = document.createElement("div");
        card.className = "customer-card";

        const pricesText = record.prices.length ? record.prices.join("\n") : "-";
        const updatesText = record.updates.length ? record.updates.join("\n") : "-";
        const scopeText = record.scopeLines.length ? record.scopeLines.map(line => `- ${line}`).join("\n") : "-";

        card.innerHTML = `
          <h2 class="customer-title">Customer ${index + 1}: ${escapeHtml(record.name)}</h2>

          <div class="field">
            <div class="field-title">Email</div>
            <div class="field-value">${escapeHtml(record.email || "-")}</div>
          </div>

          <div class="field">
            <div class="field-title">Phone</div>
            <div class="field-value">${escapeHtml(record.phone || "-")}</div>
          </div>

          <div class="field">
            <div class="field-title">Address</div>
            <div class="field-value">${escapeHtml(record.address || "-")}</div>
          </div>

          <div class="field">
            <div class="field-title">Postcode</div>
            <div class="field-value">${escapeHtml(record.postcode || "-")}</div>
          </div>

          <div class="field">
            <div class="field-title">Status</div>
            <div class="field-value">${escapeHtml(record.status || "-")}</div>
          </div>

          <div class="field">
            <div class="field-title">Scope of Works</div>
            <div class="field-value">${escapeHtml(scopeText)}</div>
          </div>

          <div class="field">
            <div class="field-title">Prices Found</div>
            <div class="field-value">${escapeHtml(pricesText)}</div>
          </div>

          <div class="field">
            <div class="field-title">Updates</div>
            <div class="field-value">${escapeHtml(updatesText)}</div>
          </div>

          <div class="field">
            <div class="field-title">CommuSoft Output</div>
            <div class="output-box" id="output-${index}">${escapeHtml(record.commusoftOutput)}</div>
          </div>

          <div class="small-row">
            <button class="btn-primary" onclick="copyCustomerOutput(${index})">Copy CommuSoft Output</button>
          </div>
        `;

        wrapper.appendChild(card);
      });

      window.__customerRecords = records;
    }

    function copyCustomerOutput(index) {
      if (!window.__customerRecords || !window.__customerRecords[index]) return;
      navigator.clipboard.writeText(window.__customerRecords[index].commusoftOutput).then(() => {
        alert("Copied customer output");
      });
    }

    function copyThreadSummary() {
      const text = document.getElementById("threadSummary").innerText;
      navigator.clipboard.writeText(text).then(() => {
        alert("Copied thread summary");
      });
    }

    function clearAllData() {
      document.getElementById("emailInput").value = "";
      document.getElementById("threadSummary").innerText = "Nothing extracted yet.";
      document.getElementById("customers").innerHTML = "";
      hideWarnings();
      window.__customerRecords = [];
    }

    function unique(arr) {
      return Array.from(new Set(arr.filter(Boolean)));
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
  </script>
</body>
</html>
